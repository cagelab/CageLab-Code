---
# Ansible playbook to force reset CageLab code repositories to their latest
# upstream state. If you don't do this, uncommitted changes or local branches
# will prevent updates and this machine dependent variance is hard to debug.
- name: Reset CageLab Code Repositories
  hosts: "{{ target | default('all') }}"
  gather_facts: true
  ignore_unreachable: true

  vars:
    repositories: # List of repositories to reset and update
      - { path: '~/Code/CageLab-Code', url: 'https://gitee.com/CogPlatform/CageLab-Code.git' }
      - { path: '~/Code/Psychtoolbox', url: 'https://gitee.com/CogPlatform/Psychtoolbox.git' }
      - { path: '~/Code/opticka', url: 'https://gitee.com/CogPlatform/opticka.git' }
      - { path: '~/Code/matmoteGO', url: 'https://gitee.com/CogPlatform/matmoteGO.git' }
      - { path: '~/Code/PTBSimia', url: 'https://gitee.com/CogPlatform/PTBSimia.git' }
      - { path: '~/Code/matlab-jzmq', url: 'https://gitee.com/CogPlatform/matlab-jzmq.git' }
      - { path: '~/Code/PacmanTask', url: 'https://gitee.com/CogPlatform/PacmanTask.git' }

  tasks:
    - name: Launch repository resets and updates
      ansible.builtin.git: # noqa latest[git]
        repo: "{{ item.url }}"
        dest: "{{ item.path | regex_replace('^~', ansible_facts['user_dir']) }}"
        version: 'HEAD'
        force: true
        accept_hostkey: true
      environment:
        GIT_TERMINAL_PROMPT: '0'
      async: 300
      poll: 0
      loop: "{{ repositories }}"
      register: repository_reset_jobs

    - name: Wait for repository resets and updates to finish
      ansible.builtin.async_status:
        jid: "{{ item.ansible_job_id }}"
      register: repository_reset_status
      until: repository_reset_status.finished
      retries: 60
      delay: 5
      loop: "{{ repository_reset_jobs.results }}"
      loop_control:
        label: "{{ item.item.path }}"

    - name: Check for submodules in repositories
      ansible.builtin.stat:
        path: "{{ item.path | regex_replace('^~', ansible_facts['user_dir']) }}/.gitmodules"
      loop: "{{ repositories }}"
      register: repo_gitmodules
      changed_when: false

    - name: Synchronize submodule URLs in repositories
      ansible.builtin.command:
        argv:
          - git
          - submodule
          - sync
          - --recursive
      args:
        chdir: "{{ item.item.path | regex_replace('^~', ansible_facts['user_dir']) }}"
      environment:
        GIT_TERMINAL_PROMPT: '0'
      loop: "{{ repo_gitmodules.results | selectattr('stat.exists') | list }}"
      changed_when: false

    - name: Reset tracked files in submodules
      ansible.builtin.command:
        argv:
          - git
          - submodule
          - foreach
          - --recursive
          - git
          - reset
          - --hard
      args:
        chdir: "{{ item.item.path | regex_replace('^~', ansible_facts['user_dir']) }}"
      environment:
        GIT_TERMINAL_PROMPT: '0'
      loop: "{{ repo_gitmodules.results | selectattr('stat.exists') | list }}"
      changed_when: false

    - name: Clean untracked files from submodules
      ansible.builtin.command:
        argv:
          - git
          - submodule
          - foreach
          - --recursive
          - git
          - clean
          - -fdx
      args:
        chdir: "{{ item.item.path | regex_replace('^~', ansible_facts['user_dir']) }}"
      environment:
        GIT_TERMINAL_PROMPT: '0'
      loop: "{{ repo_gitmodules.results | selectattr('stat.exists') | list }}"
      changed_when: false

    - name: Launch submodule initialization and updates
      ansible.builtin.command:
        argv:
          - git
          - submodule
          - update
          - --init
          - --force
          - --recursive
      args:
        chdir: "{{ item.item.path | regex_replace('^~', ansible_facts['user_dir']) }}"
      environment:
        GIT_TERMINAL_PROMPT: '0'
      async: 300
      poll: 0
      loop: "{{ repo_gitmodules.results | selectattr('stat.exists') | list }}"
      changed_when: false
      register: submodule_update_jobs

    - name: Wait for submodule initialization and updates to finish
      ansible.builtin.async_status:
        jid: "{{ item.ansible_job_id }}"
      register: submodule_update_status
      until: submodule_update_status.finished
      retries: 60
      delay: 5
      loop: "{{ submodule_update_jobs.results }}"
      loop_control:
        label: "{{ item.item.item.path }}"

    - name: Clean untracked files from repositories
      ansible.builtin.command:
        argv:
          - git
          - clean
          - -fdx
      args:
        chdir: "{{ item.path | regex_replace('^~', ansible_facts['user_dir']) }}"
      loop: "{{ repositories }}"
      register: repo_clean
      changed_when: repo_clean.stdout != ''
